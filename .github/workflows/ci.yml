name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run the test suite
        run: tests/run.sh

  packaging:
    name: Packaging dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Determinism, layout, contract, stubbed signing path, failure
      # cleanup — the same battery is runnable locally: tests/packaging.sh
      # On a release tag, the tag version is passed so the tag-vs-#define
      # VERSION contract is enforced before publishing.
      - name: Run the packaging battery
        run: |
          ARGS=()
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ARGS+=("${GITHUB_REF_NAME#v}")
          fi
          tests/packaging.sh "${ARGS[@]}"
